name: Build iOS (non signé)

# Déclenchement manuel uniquement, pour ne pas consommer de minutes macOS
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # Installer PNPM (v9 pour rester compatible avec Node 20)
      - name: Installer PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # Installer Node.js
      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Récupérer les dépendances du projet (sans cache pour éviter les conflits)
      - name: Récupérer les dépendances du projet
        run: pnpm install --frozen-lockfile

      # Générer le dossier natif /ios (Équivalent du "flutter pub get" qui prépare le terrain)
      - name: Prébuilder le projet natif (Expo)
        run: npx expo prebuild --platform ios --clean

      # Compiler l'app iOS (sans signature)
      - name: Compiler l'app iOS (sans signature)
        run: |
          cd ios

          # Trouver automatiquement le nom du workspace créé par Expo
          WORKSPACE_NAME=$(ls -d *.xcworkspace | head -n 1)
          SCHEME_NAME=$(basename "$WORKSPACE_NAME" .xcworkspace)

          xcodebuild \
            -workspace "$WORKSPACE_NAME" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

          # Sauvegarder le chemin absolu du fichier .app généré
          RELATIVE_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" | head -n 1)
          echo "FINAL_APP_PATH=$PWD/$RELATIVE_PATH" >> $GITHUB_ENV

      # Empaqueter le .app en .ipa (Exactement comme sur ton script Flutter)
      - name: Empaqueter le .app en .ipa
        run: |
          mkdir -p Payload
          cp -r "${{ env.FINAL_APP_PATH }}" Payload/
          zip -r app-unsigned.ipa Payload

      # Publier le .ipa en artifact téléchargeable
      - name: Publier le .ipa en artifact téléchargeable
        uses: actions/upload-artifact@v4
        with:
          name: app-unsigned-ipa
          path: app-unsigned.ipa
