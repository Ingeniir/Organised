name: Build iOS (Unsigned for AltStore)

on:
  workflow_dispatch: # Déclenchement manuel uniquement

jobs:
  build:
    runs-on: macos-latest # Utilise le macOS runner de GitHub

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9 # Fix: Version 9 pour assurer la compatibilité avec Node 20

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Installer les dépendances
        run: pnpm install --frozen-lockfile

      - name: Prébuilder le projet natif (Expo)
        run: npx expo prebuild --platform ios --clean # Génère le dossier ios/

      - name: Construire l'app iOS (SANS signature)
        run: |
          cd ios

          # Fix: Détection dynamique du nom du projet Expo
          SCHEME_NAME=$(basename *.xcworkspace .xcworkspace)

          xcodebuild \
            -workspace *.xcworkspace \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

          # Localise le .app généré
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" | head -n 1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Empaqueter le .app en .ipa non signé
        run: |
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r app-unsigned.ipa Payload

      - name: Publier le .ipa en artifact téléchargeable
        uses: actions/upload-artifact@v4
        with:
          name: expo-unsigned-ipa
          path: app-unsigned.ipa
