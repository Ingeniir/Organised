name: Build iOS (non signé)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer Bun
        uses: oven-sh/setup-bun@v2

      - name: Créer .env.local
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" >> .env.local
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env.local

      - name: Installer les dépendances
        run: bun install

      - name: Générer le projet iOS natif
        run: npx expo prebuild --platform ios --no-install

      - name: Installer les pods CocoaPods
        run: |
          cd ios
          pod install

      - name: Compiler l'app iOS (sans signature)
        run: |
          xcodebuild \
            -workspace ios/organised.xcworkspace \
            -scheme organised \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/organised.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Empaqueter en .ipa
        run: |
          mkdir -p Payload
          cp -r $RUNNER_TEMP/organised.xcarchive/Products/Applications/*.app Payload/
          zip -r app-unsigned.ipa Payload

      - name: Publier le .ipa en artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-unsigned-ipa
          path: app-unsigned.ipa
          retention-days: 7
