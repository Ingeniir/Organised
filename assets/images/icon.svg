<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded square tile -->
  <rect x="0" y="0" width="400" height="400" rx="56" ry="56" fill="#2a2d35"/>

  <!-- O ring (green) -->
  <circle cx="172" cy="195" r="110" fill="#10b981"/>
  <circle cx="172" cy="195" r="72" fill="#2a2d35"/>

  <!-- Background mask so "rganised." overlaps the ring -->
